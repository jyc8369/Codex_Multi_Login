<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Account Quota Cards</title>
<style>
  :root {
    --bg-base: #0d1117;
    --bg-surface: #161b22;
    --bg-elevated: #1c2333;
    --border-default: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --accent-blue: #388bfd;
    --green: #2a6e3f;
    --yellow: #eab308;
    --orange: #e18a3b;
    --red: #c12c1f;
    --gray: #6e7681;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: -apple-system, "Segoe UI", sans-serif;
  }
  .account-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 720px;
    margin: 0 auto;
  }
  .account-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .account-card.inactive {
    opacity: 0.6;
  }
  .card-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .email {
    font-weight: 700;
    font-size: 14px;
    flex: 1;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
  }
  .pill.plan-free { background: rgba(110,118,129,0.2); color: var(--gray); }
  .pill.plan-plus { background: rgba(56,139,253,0.15); color: var(--accent-blue); }
  .pill.plan-pro  { background: rgba(163,113,247,0.15); color: #a371f7; }
  .pill.status-active   { background: rgba(42,110,63,0.2); color: #3fb950; }
  .pill.status-inactive { background: rgba(110,118,129,0.2); color: var(--gray); }

  .metrics-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .metric {
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .metric-label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .metric-value {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .metric-bar {
    height: 5px;
    border-radius: 999px;
    background: var(--border-default);
    overflow: hidden;
  }
  .metric-bar > span {
    display: block;
    height: 100%;
    border-radius: 999px;
  }
  .color-green  { color: #3fb950; }
  .color-yellow { color: var(--yellow); }
  .color-orange { color: var(--orange); }
  .color-red    { color: var(--red); }
  .bar-green  { background: #3fb950; }
  .bar-yellow { background: var(--yellow); }
  .bar-orange { background: var(--orange); }
  .bar-red    { background: var(--red); }
</style>
</head>
<body>

<div class="account-list">

  <!-- 계정 1: free / active -->
  <div class="account-card">
    <div class="card-head">
      <span class="email">user1@gmail.com</span>
      <span class="pill plan-free">FREE</span>
      <span class="pill status-active">ACTIVE</span>
    </div>
    <div class="metrics-row">
      <div class="metric">
        <div class="metric-label">5시간 제한</div>
        <div class="metric-value color-green">78%</div>
        <div class="metric-bar"><span class="bar-green" style="width:78%"></span></div>
      </div>
      <div class="metric">
        <div class="metric-label">주간 제한</div>
        <div class="metric-value color-yellow">42%</div>
        <div class="metric-bar"><span class="bar-yellow" style="width:42%"></span></div>
      </div>
      <div class="metric">
        <div class="metric-label">코드리뷰</div>
        <div class="metric-value color-orange">15%</div>
        <div class="metric-bar"><span class="bar-orange" style="width:15%"></span></div>
      </div>
      <div class="metric">
        <div class="metric-label">크레딧</div>
        <div class="metric-value color-green">-</div>
        <div class="metric-bar"><span class="bar-green" style="width:100%"></span></div>
      </div>
    </div>
  </div>

  <!-- 계정 2: plus / inactive -->
  <div class="account-card inactive">
    <div class="card-head">
      <span class="email">user2@gmail.com</span>
      <span class="pill plan-plus">PLUS</span>
      <span class="pill status-inactive">INACTIVE</span>
    </div>
    <div class="metrics-row">
      <div class="metric">
        <div class="metric-label">5시간 제한</div>
        <div class="metric-value color-red">8%</div>
        <div class="metric-bar"><span class="bar-red" style="width:8%"></span></div>
      </div>
      <div class="metric">
        <div class="metric-label">주간 제한</div>
        <div class="metric-value color-green">91%</div>
        <div class="metric-bar"><span class="bar-green" style="width:91%"></span></div>
      </div>
      <div class="metric">
        <div class="metric-label">코드리뷰</div>
        <div class="metric-value color-green">100%</div>
        <div class="metric-bar"><span class="bar-green" style="width:100%"></span></div>
      </div>
      <div class="metric">
        <div class="metric-label">크레딧</div>
        <div class="metric-value color-yellow">$3.20</div>
        <div class="metric-bar"><span class="bar-yellow" style="width:32%"></span></div>
      </div>
    </div>
  </div>

  <!-- 계정 3: pro / active -->
  <div class="account-card">
    <div class="card-head">
      <span class="email">user3@gmail.com</span>
      <span class="pill plan-pro">PRO</span>
      <span class="pill status-active">ACTIVE</span>
    </div>
    <div class="metrics-row">
      <div class="metric">
        <div class="metric-label">5시간 제한</div>
        <div class="metric-value color-green">100%</div>
        <div class="metric-bar"><span class="bar-green" style="width:100%"></span></div>
      </div>
      <div class="metric">
        <div class="metric-label">주간 제한</div>
        <div class="metric-value color-green">87%</div>
        <div class="metric-bar"><span class="bar-green" style="width:87%"></span></div>
      </div>
      <div class="metric">
        <div class="metric-label">코드리뷰</div>
        <div class="metric-value color-green">95%</div>
        <div class="metric-bar"><span class="bar-green" style="width:95%"></span></div>
      </div>
      <div class="metric">
        <div class="metric-label">크레딧</div>
        <div class="metric-value color-red">0</div>
        <div class="metric-bar"><span class="bar-red" style="width:0%"></span></div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
